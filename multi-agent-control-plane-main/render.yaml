services:
  - type: web
    name: multi-agent-control-plane
    env: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ENVIRONMENT
        value: stage
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_FREEZE_MODE
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        generateValue: true
    healthCheckPath: /api/health
